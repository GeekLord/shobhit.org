name: Deploy to CWP Server

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST << 'ENDSSH'
            cd /home/shobhito/public_html
            
            echo "=== Starting deployment ==="
            echo "Current commit: $(git rev-parse HEAD)"
            
            # Fetch and reset to latest
            git fetch origin main
            git reset --hard origin/main
            
            echo "New commit: $(git rev-parse HEAD)"
            echo "=== Deployment complete at $(date) ==="
            
            # Note: Node.js app restart must be done via CWP panel
            # or by setting up a restart mechanism
          ENDSSH

      - name: Deployment summary
        run: |
          echo "Deployed to shobhit.org"
          echo "Remember to restart Node.js app in CWP if server.js was modified"
